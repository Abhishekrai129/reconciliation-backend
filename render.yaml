services:
  - type: web
    name: reconciliation-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: openai/gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
